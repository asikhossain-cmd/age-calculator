<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="age-form">
        <h2 class="age-calculator">Age Calculator</h2>
        
        <label for="bdate">Enter Your Birth Date</label>
        <input type="date" id="bdate" value="" placeholder="01/01/1900"> 
        
        <label for="cdate">Enter Current Date</label>
        <input type="date" id="cdate" value="01-01-2001">

        <input id="button" type="button" value="Click Here">

        <p id="show-age"></p>
    </form>

    

    <script src="date-calculator.js"></script>
</body>
</html>
